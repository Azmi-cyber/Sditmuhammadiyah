<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google AdSense -->
<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7501478508329856"
crossorigin="anonymous"></script>

<title>Sedang Maintenance</title>

<style>
/* CSS kamu */
</style>
</head>
<body data-theme="dark">

  <img class="bg" src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExMnUzbGJjNmRoNjMzeXBoc2NwN2dqYWxmamhkdTV6bHpxMTdzM3dleiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Va6MuZFI95flfYNMNs/giphy.gif" alt="background">
  <div class="overlay"></div>

  <button class="theme-toggle" onclick="toggleTheme()">🌙 / ☀️ Ganti Tema</button>

  <div class="card">
    <img class="avatar" src="https://i.pinimg.com/736x/88/dc/1b/88dc1bd63324aaf5383b778f18cddd94.jpg" alt="Admin">
    <h1>Gomennasai 🙏</h1>
    <p>Admin sedang dalam mengupdate UI. Tunggu beberapa menit untuk mengakses kembali. Terima kasih atas kesabarannya!</p>
    <div class="spinner"></div>
    <div class="badge">Sedang diperbarui</div>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      const current = body.getAttribute('data-theme');
      body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>

</body>
</html>
