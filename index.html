<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sedang Maintenance</title>
<style>
  :root {
    --card-bg: rgba(20, 20, 30, 0.55);
    --card-border: rgba(255, 255, 255, 0.15);
    --text-main: #ffffff;
    --text-sub: rgba(255, 255, 255, 0.8);
    --accent: #a78bfa;
    --overlay: rgba(0, 0, 0, 0.45);
  }

  [data-theme="light"] {
    --card-bg: rgba(255, 255, 255, 0.55);
    --card-border: rgba(0, 0, 0, 0.1);
    --text-main: #1a1a2e;
    --text-sub: rgba(26, 26, 46, 0.75);
    --accent: #7c3aed;
    --overlay: rgba(255, 255, 255, 0.35);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  html, body {
    min-height: 100vh;
  }

  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
    transition: color 0.3s ease;
    color: var(--text-main);
  }

  .bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: blur(1px);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    z-index: -1;
    transition: background 0.3s ease;
    backdrop-filter: blur(2px);
  }

  .theme-toggle {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 5;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-main);
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }

  .theme-toggle:hover {
    transform: scale(1.05);
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--card-bg);
    backdrop-filter: blur(14px);
    border-radius: 22px;
    padding: 45px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    border: 1px solid var(--card-border);
    transition: background 0.3s ease, border-color 0.3s ease;
    animation: floatIn 0.6s ease-out;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card img.avatar {
    width: 130px;
    height: 130px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid var(--accent);
    margin-bottom: 22px;
    box-shadow: 0 0 25px rgba(167, 139, 250, 0.4);
  }

  .card h1 {
    font-size: 24px;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }

  .card p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-sub);
    margin-bottom: 24px;
  }

  .spinner {
    width: 38px;
    height: 38px;
    border: 4px solid rgba(167, 139, 250, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .badge {
    display: inline-block;
    margin-top: 18px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 50px;
    padding: 4px 14px;
  }
</style>
</head>
<body data-theme="dark">

  <img class="bg" src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExMnUzbGJjNmRoNjMzeXBoc2NwN2dqYWxmamhkdTV6bHpxMTdzM3dleiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Va6MuZFI95flfYNMNs/giphy.gif" alt="background">
  <div class="overlay"></div>

  <button class="theme-toggle" onclick="toggleTheme()">🌙 / ☀️ Ganti Tema</button>

  <div class="card">
    <img class="avatar" src="https://i.pinimg.com/736x/88/dc/1b/88dc1bd63324aaf5383b778f18cddd94.jpg" alt="Admin">
    <h1>Gomennasai 🙏</h1>
    <p>Admin sedang dalam mengupdate UI. Tunggu beberapa menit untuk mengakses kembali. Terima kasih atas kesabarannya!</p>
    <div class="spinner"></div>
    <div class="badge">Sedang diperbarui</div>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      const current = body.getAttribute('data-theme');
      body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
